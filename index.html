<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#10212e">
<title>Orai: dabar vs pernai</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🌤</text></svg>">
<style>
:root{
  --bg:#10212e;
  --panel:#1a3142;
  --panel2:#16293a;
  --line:#2a465c;
  --text:#e8f1f7;
  --muted:#8fa9bb;
  --now:#ffc94d;
  --past:#6db3e8;
  --warm:#ff8a5c;
  --cold:#7ec8f0;
  --rain:#5fa8d3;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,"Segoe UI",Roboto,sans-serif;
  min-height:100vh;
  padding:max(12px,env(safe-area-inset-top)) 14px calc(20px + env(safe-area-inset-bottom));
}
header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px}
h1{font-size:1.15rem;font-weight:700;letter-spacing:.3px}
#dateLabel{font-size:.78rem;color:var(--muted)}
.tabs{
  display:flex;gap:5px;margin-bottom:16px;
  background:var(--panel2);border-radius:12px;padding:4px;
}
.tabs button{
  flex:1;border:0;border-radius:9px;padding:9px 0;
  background:transparent;color:var(--muted);
  font-size:.8rem;font-weight:600;cursor:pointer;
}
.tabs button.active{background:var(--now);color:#21303d}
.pick{display:none;gap:10px;margin:-6px 0 14px}
.pick.show{display:flex}
.pick label{flex:1;display:flex;flex-direction:column;gap:4px;font-size:.74rem;color:var(--muted);font-weight:600}
.pick input{
  background:var(--panel2);border:1px solid var(--line);border-radius:9px;
  color:var(--text);padding:8px 10px;font:inherit;font-size:.88rem;
  width:100%;color-scheme:dark;
}
.legend{display:flex;gap:16px;font-size:.74rem;color:var(--muted);margin:0 2px 10px}
.legend span::before{content:"";display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:5px}
.legend .l-now::before{background:var(--now)}
.legend .l-past::before{background:var(--past)}
.city{
  background:var(--panel);border:1px solid var(--line);
  border-radius:16px;padding:14px 14px 12px;margin-bottom:12px;
}
.city h2{font-size:1rem;font-weight:700;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.delta{font-size:.85rem;font-weight:700;padding:3px 9px;border-radius:99px}
.delta.warmer{background:rgba(255,138,92,.18);color:var(--warm)}
.delta.colder{background:rgba(126,200,240,.15);color:var(--cold)}
.delta.same{background:rgba(143,169,187,.15);color:var(--muted)}
.rows{display:grid;gap:8px}
.row{display:grid;grid-template-columns:64px 1fr 88px;align-items:center;gap:10px;font-size:.85rem}
.row .tag{color:var(--muted);font-size:.72rem;font-weight:600;font-variant-numeric:tabular-nums}
.bar{height:9px;border-radius:5px;position:relative;background:var(--panel2);overflow:hidden}
.bar i{position:absolute;top:0;bottom:0;border-radius:5px}
.bar.now i{background:var(--now)}
.bar.past i{background:var(--past)}
.row .val{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
.row .val small{color:var(--muted);font-size:.72rem}
.rain{display:flex;justify-content:space-between;margin-top:10px;padding-top:9px;border-top:1px solid var(--line);font-size:.76rem;color:var(--muted)}
.rain b{color:var(--rain);font-weight:600}
.city.tappable{cursor:pointer}
.chartBox{margin-top:10px;padding-top:9px;border-top:1px solid var(--line)}
.nochart{text-align:center;color:var(--muted);font-size:.78rem;padding:14px 0}
.chart{width:100%;height:auto;display:block}
.chart line{stroke:var(--line);stroke-width:1;opacity:.55}
.chart text{fill:var(--muted);font-size:9px;text-anchor:middle}
.chart text.yl{text-anchor:start}
.chart text.rl{text-anchor:end;fill:var(--rain)}
.chart rect.ra{fill:var(--now);opacity:.45}
.chart rect.rb{fill:var(--past);opacity:.45}
.chart path{fill:none;stroke-width:2;stroke-linejoin:round;stroke-linecap:round}
.chart .ln-now{stroke:var(--now)}
.chart .ln-past{stroke:var(--past)}
.src{font-size:.62rem;color:var(--muted);text-align:right;margin-top:4px;opacity:.75}
#hint{font-size:.7rem;color:var(--muted);margin:-4px 2px 10px;opacity:.8}
#status{text-align:center;color:var(--muted);font-size:.85rem;padding:30px 10px;line-height:1.5}
footer{text-align:center;font-size:.68rem;color:var(--muted);margin-top:18px;opacity:.7}
/* Kalendorius */
.calnav{display:flex;align-items:center;justify-content:center;gap:18px;margin-bottom:12px}
.calnav button{background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:9px;width:36px;height:36px;font-size:1.15rem;cursor:pointer;line-height:1}
.calnav b{font-size:1.05rem;min-width:64px;text-align:center}
.callegend{display:flex;gap:14px;justify-content:center;font-size:.72rem;color:var(--muted);margin-bottom:12px}
.callegend span::before{content:"";display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:5px}
.cl-lt::before{background:var(--now)}
.cl-lv::before{background:var(--past)}
.calgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:10px}
.month{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:10px}
.month h3{font-size:.8rem;font-weight:700;text-transform:capitalize;margin-bottom:6px;text-align:center}
.month table{width:100%;border-collapse:collapse;font-size:.64rem;text-align:center;font-variant-numeric:tabular-nums}
.month th{color:var(--muted);font-weight:600;padding:2px 0;font-size:.58rem}
.month td{padding:3px 0;border-radius:5px}
.month .wk{color:var(--muted);opacity:.55;font-size:.55rem}
.month td.lt{background:rgba(255,201,77,.3)}
.month td.lv{background:rgba(109,179,232,.3)}
.month td.both{background:linear-gradient(135deg,rgba(255,201,77,.38) 50%,rgba(109,179,232,.38) 50%)}
.month td.today{outline:1.5px solid var(--now);outline-offset:-1.5px}
.mh{margin-top:7px;font-size:.6rem;color:var(--muted);line-height:1.5}
.mh b{color:var(--text);font-weight:600}
/* Animacijos */
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:no-preference){
  .bar i{transition:width .5s ease}
  .tabs button{transition:background-color .25s ease,color .25s ease}
  .city,.month{animation:rise .4s ease both}
  .city:nth-child(2),.month:nth-child(2){animation-delay:.06s}
  .city:nth-child(3),.month:nth-child(3){animation-delay:.12s}
  .city:nth-child(4),.month:nth-child(4){animation-delay:.18s}
  .city.tappable:active{transform:scale(.985)}
  .chartBox{animation:rise .3s ease}
}
</style>
</head>
<body>
<header>
  <h1>🌤 Dabar vs pernai</h1>
  <span id="dateLabel"></span>
</header>

<div class="tabs" id="tabs">
  <button data-p="day" class="active">Diena</button>
  <button data-p="week">Savaitė</button>
  <button data-p="month">Mėnuo</button>
  <button data-p="custom">Data</button>
  <button data-p="year">Metai</button>
</div>

<div class="pick" id="pick">
  <label>Diena
    <input type="date" id="dateA">
  </label>
  <label>Lyginti su
    <input type="date" id="dateB">
  </label>
</div>

<div class="legend" id="legend">
  <span class="l-now" id="legNow">Šiemet</span>
  <span class="l-past" id="legPast">Pernai</span>
</div>

<div id="hint">Spustelėk miestą — valandų grafikas (temperatūra ir krituliai)</div>

<div id="status">Kraunami duomenys…</div>
<div id="cities"></div>

<footer>Duomenys: meteo.lt (LT miestai) · open-meteo.com (Ryga, archyvas, prognozė)</footer>

<script>
const CITIES = [
  {name:"Vilnius",  lat:54.69, lon:25.28, st:"vilniaus-ams",  pl:"vilnius"},
  {name:"Klaipėda", lat:55.71, lon:21.13, st:"klaipedos-ams", pl:"klaipeda"},
  {name:"Šiauliai", lat:55.93, lon:23.31, st:"siauliu-ams",   pl:"siauliai"},
  {name:"Ryga",     lat:56.95, lon:24.11},
];
const DAILY = "temperature_2m_max,temperature_2m_min,precipitation_sum";
let period = "day";
let calYear = new Date().getFullYear();
let renderSeq = 0;
const cache = {};
const dayCache = {};

/* ---------- Datos pagalbinės ---------- */
// Lokali data YYYY-MM-DD (toISOString naktį nuslinktų į vakar dieną dėl UTC)
function fmtDate(d){
  const p = n => String(n).padStart(2,"0");
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
}
function parseDate(s){
  const [y,m,d] = s.split("-").map(Number);
  return new Date(y, m-1, d);
}
function shift(d, days){ const n = new Date(d); n.setDate(n.getDate()+days); return n; }
function lastYear(d){ const n = new Date(d); n.setFullYear(n.getFullYear()-1); return n; }
function fShort(d){ return d.toLocaleDateString("lt-LT",{month:"2-digit",day:"2-digit"}); }
function today0(){ return parseDate(fmtDate(new Date())); }

function avg(arr){
  const v = arr.filter(x => x!==null && x!==undefined);
  if(!v.length) return null;
  return v.reduce((a,b)=>a+b,0)/v.length;
}
function sum(arr){
  const v = arr.filter(x => x!==null && x!==undefined);
  if(!v.length) return null;
  return v.reduce((a,b)=>a+b,0);
}

/* ---------- Užklausos ---------- */
async function getJSON(url){
  if(cache[url]) return cache[url];
  const r = await fetch(url);
  if(!r.ok) throw new Error("API klaida " + r.status);
  const j = await r.json();
  cache[url] = j;
  return j;
}

// Savaitės/mėnesio suvestinėms (visi miestai): Open-Meteo paros duomenys —
// meteo.lt neturi paros suvestinių, 30 d. po valandą būtų per daug užklausų
async function fetchNow(c){
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${c.lat}&longitude=${c.lon}`
    + `&daily=${DAILY}&past_days=31&forecast_days=1&timezone=auto`;
  return getJSON(url);
}
async function fetchPast(c, start, end){
  const url = `https://archive-api.open-meteo.com/v1/archive?latitude=${c.lat}&longitude=${c.lon}`
    + `&start_date=${fmtDate(start)}&end_date=${fmtDate(end)}&daily=${DAILY}&timezone=auto`;
  return getJSON(url);
}

/* Vienos paros valandų duomenys: {temps[24], rain[24], src} */

// meteo.lt laikai pateikiami UTC — konvertuojam į lokalų laiką
function tsToHours(list, tKey, tempKey, rainKey, d){
  const temps = Array(24).fill(null), rain = Array(24).fill(null);
  const key = fmtDate(d);
  (list||[]).forEach(o => {
    const dt = new Date(o[tKey].replace(" ","T") + "Z");
    if(fmtDate(dt) === key){
      const h = dt.getHours();
      temps[h] = o[tempKey];
      rain[h] = o[rainKey];
    }
  });
  return {temps, rain, src:"meteo.lt"};
}

async function ltDayHours(c, d){
  if(d > today0()){
    const j = await getJSON(`https://api.meteo.lt/v1/places/${c.pl}/forecasts/long-term`);
    return tsToHours(j.forecastTimestamps, "forecastTimeUtc", "airTemperature", "totalPrecipitation", d);
  }
  // lokali para apima dvi UTC datas, tad imam dvi stoties dienas
  const [a,b] = await Promise.all([
    getJSON(`https://api.meteo.lt/v1/stations/${c.st}/observations/${fmtDate(shift(d,-1))}`),
    getJSON(`https://api.meteo.lt/v1/stations/${c.st}/observations/${fmtDate(d)}`)
  ]);
  return tsToHours([...(a.observations||[]), ...(b.observations||[])],
    "observationTimeUtc", "airTemperature", "precipitation", d);
}

async function omDayHours(c, d){
  const diff = Math.round((today0() - d)/86400000);
  const empty = {temps:Array(24).fill(null), rain:Array(24).fill(null), src:"open-meteo.com"};
  if(diff < -15) return empty;
  let j;
  if(diff <= 88){
    j = await getJSON(`https://api.open-meteo.com/v1/forecast?latitude=${c.lat}&longitude=${c.lon}`
      + `&hourly=temperature_2m,precipitation&past_days=92&forecast_days=16&timezone=auto`);
  }else{
    j = await getJSON(`https://archive-api.open-meteo.com/v1/archive?latitude=${c.lat}&longitude=${c.lon}`
      + `&start_date=${fmtDate(d)}&end_date=${fmtDate(d)}&hourly=temperature_2m,precipitation&timezone=auto`);
  }
  const temps = Array(24).fill(null), rain = Array(24).fill(null);
  const key = fmtDate(d) + "T";
  j.hourly.time.forEach((t,i) => {
    if(t.startsWith(key)){
      const h = +t.slice(11,13);
      temps[h] = j.hourly.temperature_2m[i];
      rain[h] = j.hourly.precipitation[i];
    }
  });
  return {temps, rain, src:"open-meteo.com"};
}

// LT miestams pirma meteo.lt; nepavykus (CORS, sena data, limitai) — Open-Meteo.
// Šiandienai rodome tik iki paskutinės sveikos valandos (pvz., 22:32 → iki 22:00).
async function getDayHours(c, d){
  const key = c.name + "|" + fmtDate(d);
  if(dayCache[key]) return dayCache[key];
  let res = null;
  if(c.st){
    try{ res = await ltDayHours(c, d); }catch(e){ res = null; }
    if(res && res.temps.every(v => v===null || v===undefined)) res = null;
  }
  if(!res) res = await omDayHours(c, d);
  if(fmtDate(d) === fmtDate(new Date())){
    for(let h = new Date().getHours()+1; h < 24; h++){
      res.temps[h] = null; res.rain[h] = null;
    }
  }
  dayCache[key] = res;
  return res;
}

/* ---------- Statistika ---------- */
function slicePeriod(data, start, end){
  const t = data.daily.time;
  const out = {tmax:[], tmin:[], rain:[]};
  const s = fmtDate(start), e = fmtDate(end);
  for(let i=0;i<t.length;i++){
    if(t[i] >= s && t[i] <= e){
      out.tmax.push(data.daily.temperature_2m_max[i]);
      out.tmin.push(data.daily.temperature_2m_min[i]);
      out.rain.push(data.daily.precipitation_sum[i]);
    }
  }
  return out;
}
function stats(sl){
  const tmax = avg(sl.tmax), tmin = avg(sl.tmin);
  return {
    tavg: (tmax!==null && tmin!==null) ? (tmax+tmin)/2 : null,
    tmax, tmin,
    rain: sum(sl.rain)
  };
}
function statsFromHours(h){
  const v = h.temps.filter(x => x!==null && x!==undefined);
  const tmax = v.length ? Math.max(...v) : null;
  const tmin = v.length ? Math.min(...v) : null;
  return {
    tavg: tmax!==null ? (tmax+tmin)/2 : null,
    tmax, tmin,
    rain: sum(h.rain)
  };
}

/* ---------- Kortelės ---------- */
function barWidth(t, min, max){
  if(t===null) return 0;
  const range = Math.max(max-min, 1);
  return Math.max(6, Math.round((t-min)/range*100));
}
function deg(t){ return t===null ? "–" : t.toFixed(1)+"°"; }

function cityCard(c, idx, now, past, tagNow, tagPast, rainNow, rainPast){
  let scaleMin = Math.min(now.tmin??99, past.tmin??99, 0);
  let scaleMax = Math.max(now.tmax??-99, past.tmax??-99, 5);

  let deltaHTML = "";
  if(now.tavg!==null && past.tavg!==null){
    const d = now.tavg - past.tavg;
    const cls = d > 0.5 ? "warmer" : d < -0.5 ? "colder" : "same";
    const sign = d > 0 ? "+" : "";
    deltaHTML = `<span class="delta ${cls}">${sign}${d.toFixed(1)}°</span>`;
  }

  const row = (tag, st, cls) => `
    <div class="row">
      <span class="tag">${tag}</span>
      <div class="bar ${cls}"><i style="width:${barWidth(st.tavg, scaleMin, scaleMax)}%"></i></div>
      <span class="val">${deg(st.tavg)} <small>${deg(st.tmin)}/${deg(st.tmax)}</small></span>
    </div>`;

  const tappable = period==="day" || period==="custom";
  return `<div class="city${tappable?" tappable":""}" data-i="${idx}">
    <h2>${c.name} ${deltaHTML}</h2>
    <div class="rows">
      ${row(tagNow, now, "now")}
      ${row(tagPast, past, "past")}
    </div>
    <div class="rain">
      <span>Krituliai ${rainNow}: <b>${now.rain===null?"–":now.rain.toFixed(1)+" mm"}</b></span>
      <span>${rainPast}: <b>${past.rain===null?"–":past.rain.toFixed(1)+" mm"}</b></span>
    </div>
    ${tappable ? '<div class="chartBox" hidden></div>' : ""}
  </div>`;
}

/* ---------- Valandų grafikas ---------- */
function pathFor(vals, x, y){
  let p = "", started = false;
  vals.forEach((v,h) => {
    if(v===null || v===undefined){ started = false; return; }
    p += (started ? "L" : "M") + x(h).toFixed(1) + " " + y(v).toFixed(1) + " ";
    started = true;
  });
  return p;
}

function chartSVG(A, B){
  const all = [...A.temps, ...B.temps].filter(v => v!==null && v!==undefined);
  if(!all.length) return `<div class="nochart">Valandinių duomenų nėra</div>`;
  let min = Math.min(...all), max = Math.max(...all);
  if(max - min < 2){ const m=(max+min)/2; min = m-1; max = m+1; }
  const step = [0.5,1,2,5,10,20].find(s => (max-min)/s <= 5) || 20;
  min = Math.floor(min/step)*step;
  max = Math.ceil(max/step)*step;

  const W=360, H=180, L=34, R=34, T=12, B2=22;
  const x = h => L + (W-L-R)*h/23;
  const y = t => T + (H-T-B2)*(1-(t-min)/(max-min));

  let g = "";
  for(let t=min; t<=max+1e-9; t+=step){
    g += `<line x1="${L}" y1="${y(t).toFixed(1)}" x2="${W-R}" y2="${y(t).toFixed(1)}"/>`
      + `<text class="yl" x="2" y="${(y(t)+3).toFixed(1)}">${+t.toFixed(1)}°</text>`;
  }
  for(let h=0; h<=21; h+=3){
    g += `<line x1="${x(h).toFixed(1)}" y1="${T}" x2="${x(h).toFixed(1)}" y2="${H-B2}"/>`
      + `<text x="${x(h).toFixed(1)}" y="${H-7}">${h}</text>`;
  }
  g += `<text x="${x(23).toFixed(1)}" y="${H-7}">23</text>`;

  // Krituliai (mm) — stulpeliai, skalė dešinėje
  const rains = [...A.rain, ...B.rain].filter(v => v!==null && v!==undefined && v>0);
  let bars = "", raxis = "";
  if(rains.length){
    const rmax = Math.max(Math.ceil(Math.max(...rains)*2)/2, 0.5);
    const rh = v => (H-T-B2)*v/rmax;
    const bar = (vals, cls, off) => vals.map((v,h) =>
      (v!==null && v!==undefined && v>0)
        ? `<rect class="${cls}" x="${(x(h)+off).toFixed(1)}" y="${(H-B2-rh(v)).toFixed(1)}" width="3" height="${rh(v).toFixed(1)}"/>`
        : "").join("");
    bars = bar(A.rain,"ra",-3.2) + bar(B.rain,"rb",0.2);
    raxis = `<text class="rl" x="${W-2}" y="${T+4}">${rmax} mm</text>`
      + `<text class="rl" x="${W-2}" y="${(T+(H-T-B2)/2+3).toFixed(1)}">${rmax/2}</text>`;
  }

  return `<svg class="chart" viewBox="0 0 ${W} ${H}">${g}${bars}
    <path class="ln-past" d="${pathFor(B.temps,x,y)}"/>
    <path class="ln-now" d="${pathFor(A.temps,x,y)}"/>${raxis}</svg>`;
}

// Kurias dvi dienas rodyti grafike pagal aktyvų režimą
function chartDates(){
  if(period === "custom"){
    return {
      dA: parseDate(document.getElementById("dateA").value),
      dB: parseDate(document.getElementById("dateB").value)
    };
  }
  const t = today0();
  return {dA: t, dB: lastYear(t)};
}

/* ---------- Metų kalendorius su LT/LV šventėmis ---------- */
// Velykų sekmadienis (anoniminis Grigaliaus algoritmas)
function easter(y){
  const a=y%19, b=Math.floor(y/100), c=y%100, d=Math.floor(b/4), e=b%4,
        f=Math.floor((b+8)/25), g=Math.floor((b-f+1)/3),
        h=(19*a+b-d-g+15)%30, i=Math.floor(c/4), k=c%4,
        l=(32+2*e+2*i-h-k)%7, m=Math.floor((a+11*h+22*l)/451),
        n=Math.floor((h+l-7*m+114)/31), p=(h+l-7*m+114)%31;
  return new Date(y, n-1, p+1);
}
function nthSunday(y, m, n){
  const first = new Date(y, m, 1);
  return new Date(y, m, 1 + ((7-first.getDay())%7) + (n-1)*7);
}
function isoWeek(d){
  const t = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  t.setDate(t.getDate() + 3 - ((t.getDay()+6)%7));
  const w1 = new Date(t.getFullYear(), 0, 4);
  return 1 + Math.round(((t - w1)/86400000 - 3 + ((w1.getDay()+6)%7))/7);
}

function monthHTML(y, m, map){
  const last = new Date(y, m+1, 0);
  const name = new Date(y, m, 1).toLocaleDateString("lt-LT", {month:"long"});
  const todayKey = fmtDate(new Date());
  let d = shift(new Date(y,m,1), -((new Date(y,m,1).getDay()+6)%7));
  let rows = "";
  while(d <= last){
    let cells = `<td class="wk">${isoWeek(d)}</td>`;
    for(let i=0;i<7;i++){
      const inM = d.getMonth()===m, k = fmtDate(d);
      const hs = inM ? (map[k]||[]) : [];
      const cls = [];
      const lt = hs.some(h=>h.who.includes("LT")), lv = hs.some(h=>h.who.includes("LV"));
      if(lt&&lv) cls.push("both"); else if(lt) cls.push("lt"); else if(lv) cls.push("lv");
      if(k===todayKey && inM) cls.push("today");
      cells += `<td class="${cls.join(" ")}">${inM ? d.getDate() : ""}</td>`;
      d = shift(d,1);
    }
    rows += `<tr>${cells}</tr>`;
  }
  const pre = `${y}-${String(m+1).padStart(2,"0")}`;
  const list = Object.keys(map).filter(k=>k.startsWith(pre)).sort()
    .map(k => map[k].map(h=>`<div><b>${+k.slice(8)} d.</b> ${h.name} · ${h.who}</div>`).join("")).join("");
  return `<div class="month"><h3>${name}</h3>
    <table>
      <tr><th class="wk">sav.</th><th>Pr</th><th>An</th><th>Tr</th><th>Kt</th><th>Pn</th><th>Št</th><th>Sk</th></tr>
      ${rows}
    </table>
    ${list ? `<div class="mh">${list}</div>` : ""}</div>`;
}

function calendarHTML(y){
  const map = {};
  holidayList(y).forEach(h => { (map[h.k] = map[h.k]||[]).push(h); });
  const months = Array.from({length:12}, (_,m) => monthHTML(y, m, map)).join("");
  return `<div class="calnav">
      <button id="cprev" aria-label="Ankstesni metai">‹</button><b>${y}</b>
      <button id="cnext" aria-label="Kiti metai">›</button>
    </div>
    <div class="callegend"><span class="cl-lt">LT šventė</span><span class="cl-lv">LV šventė</span></div>
    <div class="calgrid">${months}</div>`;
}

/* ---------- Atvaizdavimas ---------- */
function setLegend(a, b){
  document.getElementById("legNow").textContent = a;
  document.getElementById("legPast").textContent = b;
}
function labelFor(start, end){
  return period==="day" ? fShort(end) : `${fShort(start)} – ${fShort(end)}`;
}

async function render(){
  const seq = ++renderSeq;
  const statusEl = document.getElementById("status");
  const box = document.getElementById("cities");
  const isDayMode = period==="day" || period==="custom";
  document.getElementById("hint").style.display = isDayMode ? "" : "none";
  document.getElementById("legend").style.display = period==="year" ? "none" : "";
  document.getElementById("pick").classList.toggle("show", period==="custom");

  if(period === "year"){
    statusEl.style.display = "none";
    document.getElementById("dateLabel").textContent = "";
    box.innerHTML = calendarHTML(calYear);
    return;
  }

  statusEl.style.display = "block";
  statusEl.textContent = "Kraunami duomenys…";
  box.innerHTML = "";

  try{
    let html;
    if(isDayMode){
      let dA, dB, lA, lB, rA, rB;
      if(period === "custom"){
        dA = parseDate(document.getElementById("dateA").value);
        dB = parseDate(document.getElementById("dateB").value);
        lA = rA = fmtDate(dA);            // pilna data su metais, kad nesimaišytų
        lB = rB = fmtDate(dB);
        document.getElementById("dateLabel").textContent = `${lA} vs ${lB}`;
      }else{
        dA = today0(); dB = lastYear(dA);
        lA = "Šiemet"; lB = "Pernai"; rA = "šiemet"; rB = "pernai";
        document.getElementById("dateLabel").textContent = fShort(dA);
      }
      setLegend(lA, lB);
      html = await Promise.all(CITIES.map(async (c, i) => {
        const [ha, hb] = await Promise.all([getDayHours(c, dA), getDayHours(c, dB)]);
        return cityCard(c, i, statsFromHours(ha), statsFromHours(hb), lA, lB, rA, rB);
      }));
    }else{
      const today = new Date();
      const n = period==="week" ? 7 : 30;
      const start = shift(today, -(n-1));
      const pStart = lastYear(start), pEnd = lastYear(today);
      document.getElementById("dateLabel").textContent = labelFor(start, today);
      setLegend("Šiemet", "Pernai");
      html = await Promise.all(CITIES.map(async (c, i) => {
        const [nowData, pastData] = await Promise.all([
          fetchNow(c),
          fetchPast(c, shift(pStart,-2), shift(pEnd,2))
        ]);
        const now  = stats(slicePeriod(nowData, start, today));
        const past = stats(slicePeriod(pastData, pStart, pEnd));
        return cityCard(c, i, now, past, "Šiemet", "Pernai", "šiemet", "pernai");
      }));
    }
    if(seq !== renderSeq) return;
    box.innerHTML = html.join("");
    statusEl.style.display = "none";
  }catch(e){
    if(seq !== renderSeq) return;
    statusEl.textContent = "Nepavyko gauti duomenų. Patikrink interneto ryšį ir bandyk dar kartą.\n(" + e.message + ")";
  }
}

/* ---------- Įvykiai ---------- */

const dateB = document.getElementById("dateB");

[dateA, dateB].forEach(el => el.addEventListener("change", () => {
  if(el.value && period === "custom") render();
}));

// Kalendoriaus navigacija + valandų grafiko išskleidimas
document.getElementById("cities").addEventListener("click", async e => {
  if(period === "year"){
    if(e.target.id === "cprev"){ calYear--; render(); }
    else if(e.target.id === "cnext"){ calYear++; render(); }
    return;
  }
  if(period !== "day" && period !== "custom") return;
  const card = e.target.closest(".city");
  if(!card || card.dataset.i === undefined) return;
  const boxEl = card.querySelector(".chartBox");
  if(!boxEl) return;
  if(!boxEl.hidden){ boxEl.hidden = true; return; }
  boxEl.hidden = false;
  if(boxEl.dataset.loaded) return;
  boxEl.innerHTML = '<div class="nochart">Kraunama…</div>';
  const c = CITIES[+card.dataset.i];
  const {dA, dB} = chartDates();
  try{
    const [ra, rb] = await Promise.all([getDayHours(c, dA), getDayHours(c, dB)]);
    boxEl.innerHTML = chartSVG(ra, rb)
      + `<div class="src">Šaltinis: ${ra.src}${ra.src!==rb.src ? " / "+rb.src : ""}</div>`;
    boxEl.dataset.loaded = "1";
  }catch(err){
    boxEl.innerHTML = '<div class="nochart">Nepavyko užkrauti (' + err.message + ')</div>';
  }
});

document.getElementById("tabs").addEventListener("click", e => {
  const b = e.target.closest("button");
  if(!b) return;
  period = b.dataset.p;
  document.querySelectorAll(".tabs button").forEach(x => x.classList.toggle("active", x===b));
  render();
});

render();
</script>
