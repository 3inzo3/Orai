<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#10212e">
<title>Orai: dabar vs pernai</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🌤</text></svg>">
<style>
:root{
  --bg:#10212e;
  --panel:#1a3142;
  --panel2:#16293a;
  --line:#2a465c;
  --text:#e8f1f7;
  --muted:#8fa9bb;
  --now:#ffc94d;
  --past:#6db3e8;
  --warm:#ff8a5c;
  --cold:#7ec8f0;
  --rain:#5fa8d3;
}
*{box-sizing:border-box;margin:0;padding:0}
[hidden]{display:none!important}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,"Segoe UI",Roboto,sans-serif;
  min-height:100vh;
  padding:max(12px,env(safe-area-inset-top)) 14px calc(20px + env(safe-area-inset-bottom));
}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
h1{font-size:1.15rem;font-weight:700;letter-spacing:.3px}
#updated{display:block;font-size:.68rem;color:var(--muted);margin-top:2px}
.hright{display:flex;align-items:center;gap:10px}
#dateLabel{font-size:.78rem;color:var(--muted)}
#refresh{
  background:var(--panel2);border:1px solid var(--line);color:var(--text);
  border-radius:9px;width:34px;height:34px;font-size:1.05rem;cursor:pointer;line-height:1;
}
#refresh.loading{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.langsel{display:flex;gap:3px;background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:3px}
.langsel button{border:0;border-radius:6px;padding:5px 8px;background:transparent;color:var(--muted);font-size:.72rem;font-weight:700;cursor:pointer;line-height:1}
.langsel button.active{background:var(--now);color:#21303d}
.tabs{
  display:flex;gap:5px;margin-bottom:16px;
  background:var(--panel2);border-radius:12px;padding:4px;
}
.tabs button{
  flex:1 1 auto;border:0;border-radius:9px;padding:9px 7px;
  background:transparent;color:var(--muted);
  font-size:.78rem;font-weight:600;cursor:pointer;
}
.tabs button.active{background:var(--now);color:#21303d}
/* Poskyrių (Diena/Savaitė/Mėnuo/Data) juosta po „Palyginti" — žemesnio
   lygio, mėlynas akcentas, kad hierarchija būtų aiški */
.subtabs{display:flex;gap:5px;margin:-8px 0 16px;background:var(--panel2);border-radius:12px;padding:4px}
.subtabs button{flex:1 1 auto;border:0;border-radius:9px;padding:8px 6px;background:transparent;color:var(--muted);font-size:.76rem;font-weight:600;cursor:pointer}
.subtabs button.active{background:var(--past);color:#10212e}
/* Prognozės trukmės pasirinkimas (3/7/14 d.) */
.fcpick{margin:-6px 0 14px}
/* Prognozės dienų sąrašas miesto kortelėje */
.fclist{display:flex;flex-direction:column}
.fcday{display:grid;grid-template-columns:54px 1fr;gap:10px;align-items:center;padding:8px 0;border-top:1px solid var(--line)}
.fcday:first-child{border-top:0}
.fcday.we{background:rgba(255,201,77,.05)}
.fcd-date{display:flex;flex-direction:column;line-height:1.2}
.fcd-date .wd{font-weight:700;font-size:.8rem;display:flex;align-items:center;gap:4px}
.fcday.we .fcd-date .wd{color:var(--now)}
.fcd-date .dt{font-size:.66rem;color:var(--muted);font-variant-numeric:tabular-nums}
.fchol{width:6px;height:6px;border-radius:50%;display:inline-block;flex:none}
.fchol.lt{background:var(--now)}
.fchol.lv{background:var(--past)}
.fchol.both{background:linear-gradient(135deg,var(--now) 50%,var(--past) 50%)}
.fcd-main{display:flex;flex-direction:column;gap:3px;min-width:0}
.fcd-line{display:flex;justify-content:space-between;align-items:center;gap:8px;font-size:.84rem;font-variant-numeric:tabular-nums}
.fcd-now .lo{color:var(--muted);font-size:.78rem}
.fcd-past{font-size:.72rem;color:var(--past)}
.fcrain{color:var(--rain);font-size:.74rem;margin-left:4px}
.fcconf{text-align:center;font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;opacity:.7;padding:9px 0 5px}
.pick{display:none;flex-direction:column;gap:9px;margin:-6px 0 14px}
.pick.show{display:flex}
.pickrow{display:flex;gap:10px}
.pick label{flex:1;display:flex;flex-direction:column;gap:4px;font-size:.74rem;color:var(--muted);font-weight:600}
.seg{display:flex;gap:5px;background:var(--panel2);border-radius:10px;padding:3px;align-self:flex-start}
.seg button{border:0;border-radius:8px;padding:6px 14px;background:transparent;color:var(--muted);font-size:.76rem;font-weight:600;cursor:pointer}
.seg button.active{background:var(--past);color:#10212e}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.chips button{border:1px solid var(--line);border-radius:99px;padding:5px 11px;background:var(--panel2);color:var(--muted);font-size:.72rem;font-weight:600;cursor:pointer}
.chips button.active{border-color:var(--past);color:var(--past)}
.picklabel{display:block;font-size:.7rem;color:var(--muted);font-weight:600;margin-top:9px;text-transform:uppercase;letter-spacing:.4px;opacity:.8}
#cmpInfo{font-size:.74rem;color:var(--muted);margin-top:7px}
#cmpInfo b{color:var(--past);font-weight:600;font-variant-numeric:tabular-nums}
.pick input{
  background:var(--panel2);border:1px solid var(--line);border-radius:9px;
  color:var(--text);padding:8px 10px;font:inherit;font-size:.88rem;
  width:100%;color-scheme:dark;
}
.legend{display:flex;gap:16px;font-size:.74rem;color:var(--muted);margin:0 2px 10px}
.legend span::before{content:"";display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:5px}
.legend .l-now::before{background:var(--now)}
.legend .l-past::before{background:var(--past)}
.city{
  background:var(--panel);border:1px solid var(--line);
  border-radius:16px;padding:14px 14px 12px;margin-bottom:12px;
}
.city h2{font-size:1rem;font-weight:700;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.delta{font-size:.85rem;font-weight:700;padding:3px 9px;border-radius:99px}
.delta.warmer{background:rgba(255,138,92,.18);color:var(--warm)}
.delta.colder{background:rgba(126,200,240,.15);color:var(--cold)}
.delta.same{background:rgba(143,169,187,.15);color:var(--muted)}
.rows{display:grid;gap:8px}
.row{display:grid;grid-template-columns:64px 1fr 88px;align-items:center;gap:10px;font-size:.85rem}
.row .tag{color:var(--muted);font-size:.72rem;font-weight:600;font-variant-numeric:tabular-nums}
.bar{height:9px;border-radius:5px;position:relative;background:var(--panel2);overflow:hidden}
.bar i{position:absolute;top:0;bottom:0;border-radius:5px}
.bar.now i{background:var(--now)}
.bar.past i{background:var(--past)}
.row .val{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
.row .val small{color:var(--muted);font-size:.72rem}
.rain{display:flex;justify-content:space-between;margin-top:10px;padding-top:9px;border-top:1px solid var(--line);font-size:.76rem;color:var(--muted)}
.rain b{font-weight:600}
.rain b.bn{color:var(--now)}
.rain b.bp{color:var(--past)}
.rain small{color:var(--muted);font-weight:400}
.comfort{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:9px;border-top:1px solid var(--line);font-size:.76rem;color:var(--muted)}
.cvals{display:flex;align-items:center;gap:6px}
.mk{width:8px;height:8px;border-radius:3px;display:inline-block;flex:none}
.mkn{background:var(--now)}
.mkp{background:var(--past)}
.cpill{min-width:34px;text-align:center;padding:2px 8px;border-radius:99px;font-weight:700;font-size:.8rem;font-variant-numeric:tabular-nums}
.cdelta{font-weight:700;color:var(--text);font-variant-numeric:tabular-nums}
.bad{margin-top:10px;padding-top:9px;border-top:1px solid var(--line);font-size:.76rem;color:var(--muted)}
.bad b{color:var(--text);font-weight:700}
.dots{display:flex;align-items:center;gap:4px;margin-top:6px}
.dots .lab{width:13px;font-size:.62rem;font-weight:700;flex:none}
.dot{width:6px;height:6px;border-radius:50%;background:var(--line);flex:none}
.dot.bd{background:var(--warm)}
.dot.rn{box-shadow:0 0 0 1.5px var(--rain)}
.dot.na{background:transparent;border:1px solid var(--line)}
.badcap{font-size:.6rem;color:var(--muted);opacity:.75;margin-top:5px}
.city.tappable{cursor:pointer}
.chartBox{margin-top:10px;padding-top:9px;border-top:1px solid var(--line)}
.nochart{text-align:center;color:var(--muted);font-size:.78rem;padding:14px 0}
.chart{width:100%;height:auto;display:block}
.chart line{stroke:var(--line);stroke-width:1;opacity:.55}
.chart text{fill:var(--muted);font-size:9px;text-anchor:middle}
.chart text.yl{text-anchor:start}
.chart text.rl{text-anchor:end;fill:var(--rain)}
.chart rect.ra{fill:var(--now);opacity:.7}
.chart rect.rb{fill:var(--past);opacity:.7}
.chart path{fill:none;stroke-width:2;stroke-linejoin:round;stroke-linecap:round}
.chart .ln-now{stroke:var(--now)}
.chart .ln-past{stroke:var(--past)}
#hint{font-size:.7rem;color:var(--muted);margin:-4px 2px 10px;opacity:.8}
#status{text-align:center;color:var(--muted);font-size:.85rem;padding:30px 10px;line-height:1.5}
#cityBox{margin-top:6px}
/* Kalendorius */
.calnav{display:flex;align-items:center;justify-content:center;gap:18px;margin-bottom:12px}
.calnav button{background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:9px;width:36px;height:36px;font-size:1.15rem;cursor:pointer;line-height:1}
.calnav b{font-size:1.05rem;min-width:64px;text-align:center}
.callegend{display:flex;gap:14px;justify-content:center;font-size:.72rem;color:var(--muted);margin-bottom:12px}
.callegend span::before{content:"";display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:5px}
.cl-lt::before{background:var(--now)}
.cl-lv::before{background:var(--past)}
.calgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.month{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:10px}
.month h3{font-size:.8rem;font-weight:700;text-transform:capitalize;margin-bottom:6px;text-align:center}
.month h3 .yp{color:var(--past)}
.month h3 .yc{color:var(--now)}
.month table{width:100%;border-collapse:collapse;font-size:.64rem;text-align:center;font-variant-numeric:tabular-nums}
.month th{color:var(--muted);font-weight:600;padding:2px 0;font-size:.58rem}
.month td{padding:3px 0;border-radius:5px}
.month .wk{color:var(--muted);opacity:.55;font-size:.55rem}
.month td.lt{background:rgba(255,201,77,.3)}
.month td.lv{background:rgba(109,179,232,.3)}
.month td.both{background:linear-gradient(135deg,rgba(255,201,77,.38) 50%,rgba(109,179,232,.38) 50%)}
.month td.today{outline:1.5px solid var(--now);outline-offset:-1.5px}
.mh{margin-top:7px;font-size:.6rem;color:var(--muted);line-height:1.5}
.mh b{color:var(--text);font-weight:600}
/* Animacijos */
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:no-preference){
  .bar i{transition:width .5s ease}
  .tabs button{transition:background-color .25s ease,color .25s ease}
  .city,.month{animation:rise .4s ease both}
  .city:nth-child(2),.month:nth-child(2){animation-delay:.06s}
  .city:nth-child(3),.month:nth-child(3){animation-delay:.12s}
  .city:nth-child(4),.month:nth-child(4){animation-delay:.18s}
  .city.tappable:active{transform:scale(.985)}
  .chartBox{animation:rise .3s ease}
}
</style>
</head>
<body>
<header>
  <div>
    <h1>🌤 Dabar vs pernai</h1>
    <span id="updated"></span>
  </div>
  <div class="hright">
    <span id="dateLabel"></span>
    <div class="langsel" id="langSel">
      <button data-l="lt">LT</button>
      <button data-l="en">EN</button>
    </div>
    <button id="refresh" aria-label="Atnaujinti duomenis">⟳</button>
  </div>
</header>

<div class="tabs" id="tabs">
  <button data-g="compare" class="active">Palyginti</button>
  <button data-g="forecast">Prognozė</button>
  <button data-g="calendar">Kalendorius</button>
</div>

<div class="subtabs" id="subtabs">
  <button data-p="day" class="active">Diena</button>
  <button data-p="week">Savaitė</button>
  <button data-p="month">Mėnuo</button>
  <button data-p="custom">Data</button>
</div>

<div class="pickrow" id="dayPickRow" style="margin:-6px 0 14px" hidden>
  <label style="flex:1;display:flex;flex-direction:column;gap:4px;font-size:.74rem;color:var(--muted);font-weight:600"><span id="dayPickLabel">Diena (lyginama su ta pačia sav. diena pernai)</span>
    <input type="date" id="dayPick" style="background:var(--panel2);border:1px solid var(--line);border-radius:9px;color:var(--text);padding:8px 10px;font:inherit;font-size:.88rem;width:100%;color-scheme:dark">
  </label>
</div>

<div class="pick" id="pick">
  <div class="seg" id="seg">
    <button data-s="single" class="active">Viena diena</button>
    <button data-s="range">Kelios dienos</button>
  </div>
  <div id="singleBox">
    <div class="pickrow">
      <label><span id="lblDateA">Diena</span>
        <input type="date" id="dateA">
      </label>
      <label><span id="lblDateB">Lyginti su</span>
        <input type="date" id="dateB">
      </label>
    </div>
    <span class="picklabel" id="quickCmpLabel">Greitas „lyginti su“ pasirinkimas</span>
    <div class="chips" id="chipsSingle">
      <button data-c="cal">Pernai ta pati data</button>
      <button data-c="dow">Pernai ta pati sav. diena</button>
    </div>
  </div>
  <div id="rangeBox" hidden>
    <div class="pickrow">
      <label><span id="lblFrom">Laikotarpis nuo</span>
        <input type="date" id="rFrom">
      </label>
      <label><span id="lblTo">iki (imtinai)</span>
        <input type="date" id="rTo">
      </label>
    </div>
    <span class="picklabel" id="cmpWhatLabel">Su kuo lyginti</span>
    <div class="chips" id="chipsRange">
      <button data-r="w1" class="active">Prieš savaitę</button>
      <button data-r="cal">Pernai (tos pačios datos)</button>
      <button data-r="dow">Pernai (tos pačios sav. dienos)</button>
    </div>
    <div id="cmpInfo"></div>
  </div>
</div>

<div class="fcpick" id="fcPick" hidden>
  <div class="seg" id="fcSeg">
    <button data-n="3">3 d.</button>
    <button data-n="7" class="active">7 d.</button>
    <button data-n="14">14 d.</button>
  </div>
</div>

<div class="legend" id="legend">
  <span class="l-now" id="legNow">Šiemet</span>
  <span class="l-past" id="legPast">Pernai</span>
</div>

<div id="hint">Spustelėk miestą — valandų grafikas (temperatūra ir krituliai)</div>

<div id="status">Kraunami duomenys…</div>
<div id="cities"></div>

<div id="cityBox">
  <span class="picklabel" id="citiesLabel">Miestai</span>
  <div class="chips" id="cityPick"></div>
</div>

<script>
const ALL_CITIES = [
  {name:"Vilnius",    lat:54.69, lon:25.28},
  {name:"Kaunas",     lat:54.90, lon:23.91},
  {name:"Klaipėda",   lat:55.71, lon:21.13},
  {name:"Nida",       lat:55.30, lon:21.00},
  {name:"Šiauliai",   lat:55.93, lon:23.31},
  {name:"Panevėžys",  lat:55.73, lon:24.36},
  {name:"Alytus",     lat:54.40, lon:24.05},
  {name:"Telšiai",    lat:55.98, lon:22.25},
  {name:"Ryga",       lat:56.95, lon:24.11, en:"Riga"},
];
// Miesto pavadinimas pagal kalbą (vidinis raktas `name` nekinta dėl localStorage)
function cityLabel(c){ return (lang === "en" && c.en) ? c.en : c.name; }

/* ---------- Kalbos (LT/EN) ---------- */
// Pasirinkta kalba įsimenama localStorage; numatytoji — lietuvių
let lang = (function(){
  try{ const s = localStorage.getItem("orai.lang"); if(s === "lt" || s === "en") return s; }catch(e){}
  return "lt";
})();
const LOCALE = {lt:"lt-LT", en:"en-GB"};
function loc(){ return LOCALE[lang]; }
const I18N = {
  lt:{
    title:"Orai: dabar vs pernai",
    h1:"🌤 Dabar vs pernai",
    refresh:"Atnaujinti duomenis",
    tab_day:"Diena", tab_week:"Savaitė", tab_month:"Mėnuo", tab_custom:"Data", tab_year:"Kalendorius",

    fcDur: n => `${n} d.`,

    fcLessAccurate:"mažiau tikslu",

    quickCmp:"Greitas „lyginti su“ pasirinkimas",
    chip_cal:"Pernai ta pati data", chip_dow:"Pernai ta pati sav. diena",
    lbl_from:"Laikotarpis nuo", lbl_to:"iki (imtinai)",
    cmpWhat:"Su kuo lyginti",
    rchip_w1:"Prieš savaitę", rchip_cal:"Pernai (tos pačios datos)", rchip_dow:"Pernai (tos pačios sav. dienos)",
    thisYear:"Šiemet", lastYear:"Pernai", thisYearLc:"šiemet", lastYearLc:"pernai",
    hint:"Spustelėk miestą — valandų grafikas (temperatūra ir krituliai)",

    bd_rainWin: (a,b,mm) => `; lietus ${a}–${b} val.: ${mm} mm`,

    badDaysPast: (bad,known) => `(pernai: ${bad} iš ${known})`,
    abbrNow:"Š", abbrPast:"P",
    badCap:"oranžinis — bloga diena · mėlynas apvadas — lietus 10–20 val.",
    comfortLabel:"Komfortas lauke",
    rainLabel:"Krituliai",
    perDay: x => ` <small>(${x}/d.)</small>`,
    noHourly:"Valandinių duomenų nėra",
    mmPerH: lbl => `▲ ${lbl} mm/val.`,
    chartLoading:"Kraunama…",
    prevYear:"Ankstesni metai", nextYear:"Kiti metai",
    ltHoliday:"LT šventė", lvHoliday:"LV šventė",
    weekAbbr:"sav.",
    dows:["Pr","An","Tr","Kt","Pn","Št","Sk"],
    calDay: d => `${d} d.`,
    periodDays: n => `${n} d. laikotarpis`,
    weekLabel: w => `${w} savaitė`,
    monthRange: (mn,d) => `${mn}, 1–${d} d.`,
    comparedTo: r => `Lyginama su: <b>${r}</b>`,
    err429:"Orų serveris laikinai pristabdė užklausas (per daug per minutę). Palauk minutę ir paspausk ⟳.",
    errGeneric: m => "Nepavyko gauti duomenų. Patikrink interneto ryšį ir bandyk dar kartą.\n(" + m + ")"
  },
  en:{
    title:"Weather: now vs last year",
    h1:"🌤 Now vs last year",
    refresh:"Refresh data",
    tab_day:"Day", tab_week:"Week", tab_month:"Month", tab_custom:"Date", tab_year:"Calendar",
    group_compare:"Compare", group_forecast:"Forecast", group_calendar:"Calendar",
    fcDur: n => `${n}d`,
    fcLabel: n => `${n}-day forecast`,
    fcLessAccurate:"less accurate",
    fcHint:"Compared with the same weekday last year · fading = lower accuracy",
    dayPickLabel:"Day (compared to the same weekday last year)",
    seg_single:"Single day", seg_range:"Several days",
    lbl_dateA:"Day", lbl_dateB:"Compare with",
    quickCmp:"Quick “compare with” options",
    chip_cal:"Same date last year", chip_dow:"Same weekday last year",
    lbl_from:"Period from", lbl_to:"to (inclusive)",
    cmpWhat:"Compare with",
    rchip_w1:"A week earlier", rchip_cal:"Last year (same dates)", rchip_dow:"Last year (same weekdays)",

// Vertimas: jei reikšmė — funkcija, iškviečiama su pateiktais argumentais
function t(k, ...args){
  const dict = I18N[lang] || I18N.lt;
  let v = dict[k];
  if(v === undefined) v = I18N.lt[k];
  return typeof v === "function" ? v(...args) : v;
}
// Rodomi miestai įsimenami localStorage; daugiau miestų = daugiau užklausų,
// tad numatytieji — keturi
function loadCitySet(){
  try{
    const saved = JSON.parse(localStorage.getItem("orai.cities"));
    if(Array.isArray(saved) && saved.length) return new Set(saved);
  }catch(e){}
  return new Set(["Vilnius","Klaipėda","Šiauliai","Ryga"]);
}
let activeCities = loadCitySet();
let CITIES = ALL_CITIES.filter(c => activeCities.has(c.name));
const DAILY = "temperature_2m_max,temperature_2m_min,precipitation_sum,"
  + "wind_speed_10m_max,wind_gusts_10m_max,sunshine_duration,daylight_duration";
const DAILY_FIELDS = DAILY.split(",");
const HOURLY = "temperature_2m,precipitation";

/* Komforto indekso (0–100) svoriai ir formos, derinta Baltijos klimatui.
   Temperatūra — varpas su plokščia viršūne [tLo..tHi]; tolstant nuo jos
   balai krinta pagal exp(-(d/σ)²), į karštį (sigmaHot) greičiau nei į šaltį,
   nes 30°+ čia retas ir sunkiai pakeliamas. Saulė vertinama kaip
   sunshine/daylight santykis — automatiškai normalizuota žiemai/vasarai. */
const COMFORT = {
  wT: .45, wRain: .25, wWind: .15, wSun: .15,  // komponentų svoriai
  tLo: 18, tHi: 24,         // optimali paros vid. temperatūra °C
  sigmaCold: 12,            // 10° → ~64 balų, 0° → ~10
  sigmaHot: 7,              // 28° → ~72, 32° → ~27
  rainHalf: 7,              // krituliai: 100·exp(-mm/7); 3 mm → 65, 10 mm → 24
  windFree: 4, windMax: 16  // m/s: iki 4 — 100 balų, ties 16 — 0
};

/* „Blogos dienos" kriterijai (pakanka bet kurio vieno) */
const BAD_DAY = {
  rainMm: 3,        // krituliai > 3 mm
  tavgBelow: 0,     // vidutinė paros temperatūra < 0°
  gustsMs: 15,      // maksimalūs vėjo gūsiai > 15 m/s
  comfortBelow: 35  // komforto indeksas < 35
};

/* Dienos lietaus žymėjimas taškeliuose: krituliai 10:00–20:00 vietos laiku.
   Open-Meteo valandos reikšmė — praėjusios valandos suma, tad imamos
   valandos 11..20. minMm — slenkstis, kad dulksna nežymėtų visko. */
const DAYRAIN = {fromH: 11, toH: 20, minMm: 0.3};
let period = "day";
let lastComparePeriod = "day";  // paskutinis „Palyginti" poskyris (grįžimui)
let fcDays = 7;           // prognozės trukmė: 3 / 7 / 14 d.
let subMode = "single";   // „Data" tabo režimas: viena diena ar laikotarpis
let rangeCmp = "w1";      // su kuo lyginti laikotarpį
let calYear = new Date().getFullYear();
let renderSeq = 0;
let lastFetch = 0;
const cache = {};
const dayCache = {};

function clearData(){
  for(const k in cache) delete cache[k];
  for(const k in dayCache) delete dayCache[k];
}
function markUpdated(){
  lastFetch = Date.now();
  document.getElementById("updated").textContent =
    t("updatedPre") + new Date().toLocaleTimeString(loc(),{hour:"2-digit",minute:"2-digit"});
}

/* ---------- Datos pagalbinės ---------- */
// Lokali data YYYY-MM-DD (toISOString naktį nuslinktų į vakar dieną dėl UTC)
function fmtDate(d){
  const p = n => String(n).padStart(2,"0");
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
}
function parseDate(s){
  const [y,m,d] = s.split("-").map(Number);
  return new Date(y, m-1, d);
}
function shift(d, days){ const n = new Date(d); n.setDate(n.getDate()+days); return n; }
function lastYear(d){ const n = new Date(d); n.setFullYear(n.getFullYear()-1); return n; }
function fShort(d){ return d.toLocaleDateString(loc(),{month:"2-digit",day:"2-digit"}); }
// Trumpa data kortelių žymoms: 26-06-12 (pilna 2026-06-12 netelpa stulpelyje)
function fShortY(d){ return fmtDate(d).slice(2); }
function today0(){ return parseDate(fmtDate(new Date())); }

function avg(arr){
  const v = arr.filter(x => x!==null && x!==undefined);
  if(!v.length) return null;
  return v.reduce((a,b)=>a+b,0)/v.length;
}
function sum(arr){
  const v = arr.filter(x => x!==null && x!==undefined);
  if(!v.length) return null;
  return v.reduce((a,b)=>a+b,0);
}

/* ---------- Užklausos ---------- */
// Kešuojamas pažadas, ne rezultatas — lygiagrečios užklausos tuo pačiu URL
// susijungia į vieną; nepavykusi šalinama, kad ⟳ galėtų bandyti iš naujo
async function getJSON(url){
  if(!cache[url]){
    cache[url] = (async () => {
      const r = await fetch(url);
      if(!r.ok) throw new Error(t("apiErr", r.status));
      return r.json();
    })();
  }
  try{ return await cache[url]; }
  catch(e){ delete cache[url]; throw e; }
}
// 429 = Open-Meteo minutės limitas; pasakom žmogiškai
function errText(e){
  const m = String(e && e.message || e);
  return m.includes("429") ? t("tooMany") : t("loadFail", m);
}

// Pastarosios ~3 mėn. ir prognozė: paros suvestinės IR valandiniai vienoje
// užklausoje — ją dalinasi visi rodiniai, tad užklausų mažiau, ne daugiau
async function fetchRecent(c){
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${c.lat}&longitude=${c.lon}`
    + `&daily=${DAILY}&hourly=${HOURLY}&past_days=92&forecast_days=16`
    + `&wind_speed_unit=ms&timezone=auto`;
  return getJSON(url);
}
// Paros suvestinės iš archyvo (nuo 1940 m., vėluoja ~5 d.);
// withHourly prideda valandinį lietų dienos lietaus (10–20 val.) žymoms
async function fetchPast(c, start, end, withHourly){
  const url = `https://archive-api.open-meteo.com/v1/archive?latitude=${c.lat}&longitude=${c.lon}`
    + `&start_date=${fmtDate(start)}&end_date=${fmtDate(end)}&daily=${DAILY}`
    + (withHourly ? `&hourly=precipitation` : ``)
    + `&wind_speed_unit=ms&timezone=auto`;
  return getJSON(url);
}
// Kritulių suma DAYRAIN lange kiekvienai atsakymo dienai: {data: mm}
function dayRainMap(j){
  const out = {};
  if(!j.hourly || !j.hourly.precipitation) return out;
  j.hourly.time.forEach((t,i) => {
    const h = +t.slice(11,13);
    if(h >= DAYRAIN.fromH && h <= DAYRAIN.toH){
      const v = j.hourly.precipitation[i];
      if(v !== null) out[t.slice(0,10)] = (out[t.slice(0,10)]||0) + v;
    }
  });
  return out;
}
// Paros duomenys bet kokiam laikotarpiui: senesnė dalis iš archyvo,
// paskutinės ~5 d. ir ateitis iš forecast API; sujungiama pagal datą.
// Trumpiems laikotarpiams (≤45 d.) pridedamas valandinis lietus žymoms.
async function rangeDaily(c, s, e){
  const cut = shift(today0(), -6);
  const wantHourly = Math.round((e - s)/86400000) <= 45;
  const datas = [];
  if(s <= cut) datas.push(await fetchPast(c, s, e <= cut ? e : cut, wantHourly));
  if(e > cut) datas.push(await fetchRecent(c));
  const merged = {daily:{time:[], rain1020:[]}};
  DAILY_FIELDS.forEach(f => merged.daily[f] = []);
  const seen = {};
  datas.forEach(j => {
    const rmap = dayRainMap(j);
    j.daily.time.forEach((t,i) => {
      if(seen[t]) return;
      seen[t] = 1;
      merged.daily.time.push(t);
      merged.daily.rain1020.push(t in rmap ? rmap[t] : null);
      DAILY_FIELDS.forEach(f => merged.daily[f].push(j.daily[f] ? j.daily[f][i] : null));
    });
  });
  return merged;
}

/* Vienos paros duomenys: {temps[24], rain[24], day} — valandiniai grafikui ir
   paros įrašas (day) komforto indeksui. Šiandienos VALANDOS kerpamos iki
   paskutinės sveikos valandos (22:32 → iki 22:00), bet komfortas skaičiuojamas
   iš visos paros — klausimas „ar šiandien palanku būti lauke" yra apie visą dieną. */
async function getDayHours(c, d){
  const key = c.name + "|" + fmtDate(d);
  if(dayCache[key]) return dayCache[key];
  const temps = Array(24).fill(null), rain = Array(24).fill(null);
  let day = null;
  const diff = Math.round((today0() - d)/86400000);
  if(diff >= -15){
    const j = diff <= 88
      ? await fetchRecent(c)
      : await getJSON(`https://archive-api.open-meteo.com/v1/archive?latitude=${c.lat}&longitude=${c.lon}`
        + `&start_date=${fmtDate(d)}&end_date=${fmtDate(d)}&daily=${DAILY}&hourly=${HOURLY}`
        + `&wind_speed_unit=ms&timezone=auto`);
    const pre = fmtDate(d) + "T";
    j.hourly.time.forEach((t,i) => {
      if(t.startsWith(pre)){
        const h = +t.slice(11,13);
        temps[h] = j.hourly.temperature_2m[i];
        rain[h] = j.hourly.precipitation[i];
      }
    });
    day = dayRecord(j, fmtDate(d));
  }
  if(fmtDate(d) === fmtDate(new Date())){
    for(let h = new Date().getHours()+1; h < 24; h++){
      temps[h] = null; rain[h] = null;
    }
  }
  return dayCache[key] = {temps, rain, day};
}

/* ---------- Statistika ---------- */
// Vienos paros įrašas iš API atsakymo (i — indeksas daily masyvuose)
function dayRecordAt(j, i, date){
  const get = f => (j.daily[f] && j.daily[f][i] !== undefined) ? j.daily[f][i] : null;
  return {
    date,
    tmax: get("temperature_2m_max"), tmin: get("temperature_2m_min"),
    rain: get("precipitation_sum"),  wind: get("wind_speed_10m_max"),
    gusts: get("wind_gusts_10m_max"),
    sun: get("sunshine_duration"),   daylight: get("daylight_duration"),
    rain1020: get("rain1020")
  };
}
function dayRecord(j, dateKey){
  const i = j.daily ? j.daily.time.indexOf(dateKey) : -1;
  return i < 0 ? null : dayRecordAt(j, i, dateKey);
}
// Laikotarpio dienos kaip įrašų masyvas [start..end]
function sliceDays(data, start, end){
  const out = [];
  const s = fmtDate(start), e = fmtDate(end);
  data.daily.time.forEach((t,i) => {
    if(t >= s && t <= e) out.push(dayRecordAt(data, i, t));
  });
  return out;
}
function stats(days){
  const tmax = avg(days.map(d => d.tmax)), tmin = avg(days.map(d => d.tmin));
  return {
    tavg: (tmax!==null && tmin!==null) ? (tmax+tmin)/2 : null,
    tmax, tmin,
    rain: sum(days.map(d => d.rain))
  };
}
function statsFromHours(h){
  const v = h.temps.filter(x => x!==null && x!==undefined);
  const tmax = v.length ? Math.max(...v) : null;
  const tmin = v.length ? Math.min(...v) : null;
  return {
    tavg: tmax!==null ? (tmax+tmin)/2 : null,
    tmax, tmin,
    rain: sum(h.rain)
  };
}

/* ---------- Komforto indeksas ir blogos dienos ---------- */
// Vienos paros komfortas 0–100: {score, partial} arba null, jei nėra duomenų.
// Trūkstant dalies parametrų svoriai pernormuojami per likusius (partial=true),
// todėl NaN niekada negaunamas.
function comfortIndex(d){
  if(!d) return null;
  const parts = [];
  if(d.tmax!==null && d.tmin!==null){
    const t = (d.tmax + d.tmin)/2;
    const dist = t < COMFORT.tLo ? COMFORT.tLo - t : t > COMFORT.tHi ? t - COMFORT.tHi : 0;
    const sigma = t < COMFORT.tLo ? COMFORT.sigmaCold : COMFORT.sigmaHot;
    parts.push({w:COMFORT.wT, s:100*Math.exp(-((dist/sigma)**2))});
  }
  if(d.rain!==null) parts.push({w:COMFORT.wRain, s:100*Math.exp(-d.rain/COMFORT.rainHalf)});
  if(d.wind!==null){
    const over = Math.max(0, d.wind - COMFORT.windFree);
    parts.push({w:COMFORT.wWind, s:100*Math.max(0, 1 - over/(COMFORT.windMax - COMFORT.windFree))});
  }
  if(d.sun!==null && d.daylight) parts.push({w:COMFORT.wSun, s:100*Math.min(1, d.sun/d.daylight)});
  if(!parts.length) return null;
  const wSum = parts.reduce((a,p) => a+p.w, 0);
  return {
    score: Math.round(parts.reduce((a,p) => a + p.w*p.s, 0)/wSum),
    partial: parts.length < 4
  };
}
// Laikotarpiui — dienų indeksų vidurkis (ne vidurkių indeksas,
// kad varpo forma neišsilygintų)
function comfortForDays(days){
  const list = days.map(comfortIndex).filter(x => x);
  if(!list.length) return null;
  return {
    score: Math.round(list.reduce((a,x) => a+x.score, 0)/list.length),
    partial: list.some(x => x.partial) || list.length < days.length
  };
}
// Ar para „bloga" pagal BAD_DAY kriterijus; null — nepakanka duomenų spręsti
function badDayInfo(d){
  const tavg = (d.tmax!==null && d.tmin!==null) ? (d.tmax+d.tmin)/2 : null;
  const c = comfortIndex(d);
  if(d.rain===null && tavg===null && d.gusts===null && !c) return null;
  const why = [];
  if(d.rain!==null && d.rain > BAD_DAY.rainMm) why.push(t("bd_rain", d.rain.toFixed(1)));
  if(tavg!==null && tavg < BAD_DAY.tavgBelow) why.push(t("bd_temp", tavg.toFixed(1)));
  if(d.gusts!==null && d.gusts > BAD_DAY.gustsMs) why.push(t("bd_gusts", Math.round(d.gusts)));
  if(c && c.score < BAD_DAY.comfortBelow) why.push(t("bd_comfort", c.score));
  return {bad: why.length > 0, why: why.length ? why.join(", ") : t("bd_good")};
}

/* ---------- Kortelės ---------- */
// Komforto spalva raudona→geltona→žalia. Tiesinis hue=score×1.2 darydavo
// 68 balų jau žalią; laipsnio kreivė (^1.7) pastumia vidurį į geltoną/oranžinę,
// tad žalia lieka tik tikrai geroms dienoms. Inkarai: ~35 (blogos dienos riba)
// raudona-oranžinė, ~50 oranžinė, ~68 geltona, 85+ žalia.
function comfortHue(score){ return Math.round(120 * Math.pow(Math.max(0, score)/100, 1.7)); }
// Žodinė kokybės etiketė (tooltip'ui), suderinta su blogos dienos slenksčiu
function comfortWord(score){
  return score < BAD_DAY.comfortBelow ? t("cw_bad") : score < 55 ? t("cw_mid")
       : score < 75 ? t("cw_good") : t("cw_great");
}
function comfortPill(c, label){
  if(!c) return `<b class="cpill" style="background:rgba(143,169,187,.15);color:var(--muted)"`
    + ` title="${label}: ${t("noData")}">–</b>`;
  const h = comfortHue(c.score);
  const tip = `${label}: ${c.score}/100 — ${comfortWord(c.score)}`
    + (c.partial ? t("partial") : "");
  return `<b class="cpill" style="background:hsla(${h},60%,50%,.18);color:hsl(${h},72%,62%)"`
    + ` title="${tip}">${c.partial?"~":""}${c.score}</b>`;
}

// Mėnesio „blogų dienų" palyginimas: skaičiai + taškelių eilutės
// (taškas = mėnesio diena nuo 1 d.; pilkas — gera, oranžinis — bloga,
// tuščias — nėra duomenų ir į skaičių neįtraukiama)
function badDaysHTML(daysA, daysB){
  const row = days => {
    let dots = "", bad = 0, known = 0;
    days.forEach(d => {
      const info = badDayInfo(d);
      if(!info){ dots += `<span class="dot na" title="${d.date}: ${t("noData")}"></span>`; return; }
      known++;
      if(info.bad) bad++;
      // užpildas — gera/bloga diena, mėlynas apvadas — lietus 10–20 val.;
      // abu gali būti kartu (bloga diena su dienos lietumi)
      const wetDay = d.rain1020 !== null && d.rain1020 >= DAYRAIN.minMm;
      const cls = (info.bad ? " bd" : "") + (wetDay ? " rn" : "");
      const why = info.why + (wetDay ? t("bd_rainWin", DAYRAIN.fromH-1, DAYRAIN.toH, d.rain1020.toFixed(1)) : "");
      dots += `<span class="dot${cls}" title="${d.date}: ${why}"></span>`;
    });
    return {dots, bad, known};
  };
  const a = row(daysA), b = row(daysB);
  return `<div class="bad">
    <div>${t("badDaysLabel")} <b>${a.bad} ${t("of")} ${a.known}</b> <span>${t("badDaysPast", b.bad, b.known)}</span></div>
    <div class="dots"><span class="lab" style="color:var(--now)">${t("abbrNow")}</span>${a.dots}</div>
    <div class="dots"><span class="lab" style="color:var(--past)">${t("abbrPast")}</span>${b.dots}</div>
    <div class="badcap">${t("badCap")}</div>
  </div>`;
}

function barWidth(temp, min, max){
  if(temp===null) return 0;
  const range = Math.max(max-min, 1);
  return Math.max(6, Math.round((temp-min)/range*100));
}
function deg(temp){ return temp===null ? "–" : temp.toFixed(1)+"°"; }

function cityCard(c, idx, now, past, o){
  let scaleMin = Math.min(now.tmin??99, past.tmin??99, 0);
  let scaleMax = Math.max(now.tmax??-99, past.tmax??-99, 5);

  let deltaHTML = "";
  if(now.tavg!==null && past.tavg!==null){
    const d = now.tavg - past.tavg;
    const cls = d > 0.5 ? "warmer" : d < -0.5 ? "colder" : "same";
    const sign = d > 0 ? "+" : "";
    deltaHTML = `<span class="delta ${cls}">${sign}${d.toFixed(1)}°</span>`;
  }

  const row = (tag, st, cls) => `
    <div class="row">
      <span class="tag">${tag}</span>
      <div class="bar ${cls}"><i style="width:${barWidth(st.tavg, scaleMin, scaleMax)}%"></i></div>
      <span class="val">${deg(st.tavg)} <small>${deg(st.tmin)}/${deg(st.tmax)}</small></span>
    </div>`;

  // suma + paros vidurkis, kai laikotarpis ilgesnis nei diena
  const rainVal = r => r===null ? "–"
    : r.toFixed(1)+" mm" + (o.nDays>1 && r>0 ? t("perDay", (r/o.nDays).toFixed(1)) : "");

  let comfortHTML = "";
  if(o.cNow !== undefined){
    let delta = "";
    if(o.cNow && o.cPast){
      const d = o.cNow.score - o.cPast.score;
      delta = `<span class="cdelta">${d>0?"+":""}${d}</span>`;
    }
    comfortHTML = `<div class="comfort">
      <span>${t("comfortLabel")}</span>
      <span class="cvals">
        <i class="mk mkn"></i>${comfortPill(o.cNow, o.tagNow)}
        <i class="mk mkp"></i>${comfortPill(o.cPast, o.tagPast)}
        ${delta}
      </span>
    </div>`;
  }

  return `<div class="city${o.tappable?" tappable":""}" data-i="${idx}">
    <h2>${cityLabel(c)} ${deltaHTML}</h2>
    <div class="rows">
      ${row(o.tagNow, now, "now")}
      ${row(o.tagPast, past, "past")}
    </div>
    ${comfortHTML}
    <div class="rain">
      <span>${t("rainLabel")}${o.rainNow?" "+o.rainNow:""}: <b class="bn">${rainVal(now.rain)}</b></span>
      <span>${o.rainPast?o.rainPast+": ":""}<b class="bp">${rainVal(past.rain)}</b></span>
    </div>
    ${o.badHTML || ""}
    ${o.tappable ? '<div class="chartBox" hidden></div>' : ""}
  </div>`;
}

/* ---------- Prognozė („Ko tikėtis") ---------- */
// Vienos prognozės dienos eilutė: šių metų prognozė vs pernai ta pati sav. diena.
// op — patikimumo blukimas; holMap — švenčių žemėlapis (data → įrašai).
function fcDayRow(d, nowRec, pastRec, op, holMap){
  const isWE = d.getDay()===0 || d.getDay()===6;
  const hs = holMap[fmtDate(d)] || [];
  let holDot = "";
  if(hs.length){
    const lt = hs.some(h=>h.who.includes("LT")), lv = hs.some(h=>h.who.includes("LV"));
    const cls = lt&&lv ? "both" : lt ? "lt" : "lv";
    holDot = `<span class="fchol ${cls}" title="${hs.map(h=>h.name).join(", ")}"></span>`;
  }
  // šių metų temperatūros (max ryškiai, min blankiau) + dienos krituliai
  const tNow = nowRec
    ? `<b>${deg(nowRec.tmax)}</b> <span class="lo">${deg(nowRec.tmin)}</span>`
    : `<span class="lo">${t("noData")}</span>`;
  const rain = (nowRec && nowRec.rain!==null && nowRec.rain>0)
    ? `<span class="fcrain">☔ ${nowRec.rain.toFixed(1)} mm</span>` : "";
  const tPast = pastRec ? `${deg(pastRec.tmax)} / ${deg(pastRec.tmin)}` : t("noData");
  return `<div class="fcday${isWE?" we":""}" style="opacity:${op}">
    <div class="fcd-date">
      <span class="wd">${cap(fDow(d))}${holDot}</span>
      <span class="dt">${fShort(d)}</span>
    </div>
    <div class="fcd-main">
      <div class="fcd-line">
        <span class="fcd-now">${tNow}${rain}</span>
        ${comfortPill(comfortIndex(nowRec), t("thisYear"))}
      </div>
      <div class="fcd-line fcd-past">
        <span>${t("lastYearLc")}: ${tPast}</span>
        ${comfortPill(comfortIndex(pastRec), t("lastYear"))}
      </div>
    </div>
  </div>`;
}
// Miesto prognozės kortelė: dienų sąrašas su patikimumo pakopomis
// (1–3 d. ryškiai, 4–7 vidutiniškai, 8–14 blankiai + „mažiau tikslu" žymė)
function forecastCard(c, fcList, jNow, pastData, holMap, todayStart){
  let rows = "", confShown = false;
  fcList.forEach(d => {
    const nowRec = dayRecord(jNow, fmtDate(d));
    const pastRec = dayRecord(pastData, fmtDate(isoAlign(d)));
    const offset = Math.round((d - todayStart)/86400000);
    const op = offset <= 2 ? 1 : offset <= 6 ? .82 : .55;
    if(offset >= 7 && !confShown){ confShown = true; rows += `<div class="fcconf">${t("fcLessAccurate")}</div>`; }
    rows += fcDayRow(d, nowRec, pastRec, op, holMap);
  });
  return `<div class="city"><h2>${cityLabel(c)}</h2><div class="fclist">${rows}</div></div>`;
}

/* ---------- Valandų grafikas ---------- */
function pathFor(vals, x, y){
  let p = "", started = false;
  vals.forEach((v,h) => {
    if(v===null || v===undefined){ started = false; return; }
    p += (started ? "L" : "M") + x(h).toFixed(1) + " " + y(v).toFixed(1) + " ";
    started = true;
  });
  return p;
}

function chartSVG(A, B){
  const all = [...A.temps, ...B.temps].filter(v => v!==null && v!==undefined);
  if(!all.length) return `<div class="nochart">${t("noHourly")}</div>`;
  let min = Math.min(...all), max = Math.max(...all);
  if(max - min < 2){ const m=(max+min)/2; min = m-1; max = m+1; }
  const step = [0.5,1,2,5,10,20].find(s => (max-min)/s <= 5) || 20;
  min = Math.floor(min/step)*step;
  max = Math.ceil(max/step)*step;

  const W=360, H=180, L=34, R=34, T=12, B2=22;
  const x = h => L + (W-L-R)*h/23;
  const y = temp => T + (H-T-B2)*(1-(temp-min)/(max-min));

  let g = "";
  for(let temp=min; temp<=max+1e-9; temp+=step){
    g += `<line x1="${L}" y1="${y(temp).toFixed(1)}" x2="${W-R}" y2="${y(temp).toFixed(1)}"/>`
      + `<text class="yl" x="2" y="${(y(temp)+3).toFixed(1)}">${+temp.toFixed(1)}°</text>`;
  }
  for(let h=0; h<=21; h+=3){
    g += `<line x1="${x(h).toFixed(1)}" y1="${T}" x2="${x(h).toFixed(1)}" y2="${H-B2}"/>`
      + `<text x="${x(h).toFixed(1)}" y="${H-7}">${h}</text>`;
  }
  g += `<text x="${x(23).toFixed(1)}" y="${H-7}">23</text>`;

  // Krituliai (mm) — stulpeliai; skalę nusako viena žyma = aukščiausio
  // stulpelio reikšmė (taip išvengiame painių trupmenų 0.25 / 0.5 ašyje)
  const rains = [...A.rain, ...B.rain].filter(v => v!==null && v!==undefined && v>0);
  let bars = "", raxis = "";
  if(rains.length){
    const peak = Math.max(...rains);
    const rmax = peak * 1.18;     // šiek tiek vietos virš aukščiausio stulpelio
    const rh = v => (H-T-B2)*v/rmax;
    const bar = (vals, cls, off) => vals.map((v,h) =>
      (v!==null && v!==undefined && v>0)
        ? `<rect class="${cls}" x="${(x(h)+off).toFixed(1)}" y="${(H-B2-rh(v)).toFixed(1)}" width="3" height="${rh(v).toFixed(1)}"/>`
        : "").join("");
    bars = bar(A.rain,"ra",-3.2) + bar(B.rain,"rb",0.2);
    const lbl = peak >= 10 ? Math.round(peak) : peak.toFixed(1);
    raxis = `<text class="rl" x="${W-2}" y="${T+4}">${t("mmPerH", lbl)}</text>`;
  }

  return `<svg class="chart" viewBox="0 0 ${W} ${H}">${g}${bars}
    <path class="ln-past" d="${pathFor(B.temps,x,y)}"/>
    <path class="ln-now" d="${pathFor(A.temps,x,y)}"/>${raxis}</svg>`;
}

/* ---------- Metų kalendorius su LT/LV šventėmis ---------- */
// Velykų sekmadienis (anoniminis Grigaliaus algoritmas)
function easter(y){
  const a=y%19, b=Math.floor(y/100), c=y%100, d=Math.floor(b/4), e=b%4,
        f=Math.floor((b+8)/25), g=Math.floor((b-f+1)/3),
        h=(19*a+b-d-g+15)%30, i=Math.floor(c/4), k=c%4,
        l=(32+2*e+2*i-h-k)%7, m=Math.floor((a+11*h+22*l)/451),
        n=Math.floor((h+l-7*m+114)/31), p=(h+l-7*m+114)%31;
  return new Date(y, n-1, p+1);
}
function nthSunday(y, m, n){
  const first = new Date(y, m, 1);
  return new Date(y, m, 1 + ((7-first.getDay())%7) + (n-1)*7);
}
function isoWeek(d){
  const t = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  t.setDate(t.getDate() + 3 - ((t.getDay()+6)%7));
  const w1 = new Date(t.getFullYear(), 0, 4);
  return 1 + Math.round(((t - w1)/86400000 - 3 + ((w1.getDay()+6)%7))/7);
}
function isoYear(d){
  const t = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  t.setDate(t.getDate() + 3 - ((t.getDay()+6)%7));
  return t.getFullYear();
}
function isoWeeksInYear(y){ return isoWeek(new Date(y, 11, 28)); }
// Ta pati ISO savaitė ir ta pati savaitės diena praėjusiais metais
// (pvz., 2026 m. 3 sav. antradienis → 2025 m. 3 sav. antradienis)
function isoAlign(d){
  const y = isoYear(d) - 1;
  const w = Math.min(isoWeek(d), isoWeeksInYear(y));
  const wd = (d.getDay()+6)%7;
  const jan4 = new Date(y, 0, 4);
  const mon1 = shift(jan4, -((jan4.getDay()+6)%7));
  return shift(mon1, (w-1)*7 + wd);
}

  add(new Date(y,11,31),"Naujųjų metų išvakarės (Vecgada diena)", "New Year's Eve (Vecgada diena)", "LV");

function monthHTML(y, m, map, cur){
  const last = new Date(y, m+1, 0);
  const name = new Date(y, m, 1).toLocaleDateString(loc(), {month:"long"});
  const todayKey = fmtDate(new Date());
  let d = shift(new Date(y,m,1), -((new Date(y,m,1).getDay()+6)%7));
  let rows = "";
  while(d <= last){
    let cells = `<td class="wk">${isoWeek(d)}</td>`;
    for(let i=0;i<7;i++){
      const inM = d.getMonth()===m, k = fmtDate(d);
      const hs = inM ? (map[k]||[]) : [];
      const cls = [];
      const lt = hs.some(h=>h.who.includes("LT")), lv = hs.some(h=>h.who.includes("LV"));
      if(lt&&lv) cls.push("both"); else if(lt) cls.push("lt"); else if(lv) cls.push("lv");
      if(k===todayKey && inM) cls.push("today");
      cells += `<td class="${cls.join(" ")}">${inM ? d.getDate() : ""}</td>`;
      d = shift(d,1);
    }
    rows += `<tr>${cells}</tr>`;
  }
  const pre = `${y}-${String(m+1).padStart(2,"0")}`;
  const list = Object.keys(map).filter(k=>k.startsWith(pre)).sort()
    .map(k => map[k].map(h=>`<div><b>${t("calDay", +k.slice(8))}</b> ${h.name} · ${h.who}</div>`).join("")).join("");
  const dows = t("dows");
  return `<div class="month"><h3>${name} <span class="${cur?"yc":"yp"}">${y}</span></h3>
    <table>
      <tr><th class="wk">${t("weekAbbr")}</th>${dows.map(d=>`<th>${d}</th>`).join("")}</tr>
      ${rows}
    </table>
    ${list ? `<div class="mh">${list}</div>` : ""}</div>`;
}

// Du metai greta: kairėje pernai (mėlyna), dešinėje šiemet (geltona),
// mėnuo prie mėnesio — sausis 2025 šalia sausio 2026
function calendarHTML(y){
  const mkMap = yy => {
    const m = {};
    holidayList(yy).forEach(h => { (m[h.k] = m[h.k]||[]).push(h); });
    return m;
  };
  const mapPrev = mkMap(y-1), mapCur = mkMap(y);
  let months = "";
  for(let m=0; m<12; m++){
    months += monthHTML(y-1, m, mapPrev, false) + monthHTML(y, m, mapCur, true);
  }
  return `<div class="calnav">
      <button id="cprev" aria-label="${t("prevYear")}">‹</button>
      <b>${y-1} vs ${y}</b>
      <button id="cnext" aria-label="${t("nextYear")}">›</button>
    </div>
    <div class="callegend"><span class="cl-lt">${t("ltHoliday")}</span><span class="cl-lv">${t("lvHoliday")}</span></div>
    <div class="calgrid">${months}</div>`;
}

function setLegend(a, b){
  document.getElementById("legNow").textContent = a;
  document.getElementById("legPast").textContent = b;
}
function cap(s){ return s.charAt(0).toUpperCase() + s.slice(1); }
function fDow(d){ return d.toLocaleDateString(loc(), {weekday:"short"}); }
// Miestai kraunami nepriklausomai: nepavykusiam rodoma klaida jo kortelėje,
// kiti rodomi normaliai; jei nepavyko visi — bendras pranešimas
async function renderCities(buildCard){
  const results = await Promise.allSettled(CITIES.map(buildCard));
  if(!results.some(r => r.status === "fulfilled")) throw results[0].reason;
  return results.map((r, i) => r.status === "fulfilled" ? r.value
    : `<div class="city"><h2>${cityLabel(CITIES[i])}</h2><div class="nochart">${errText(r.reason)}</div></div>`);
}

// Tabo grupė pagal periodą: „Palyginti" (day/week/month/custom), „Prognozė", „Kalendorius"
function periodGroup(p){ return p==="year" ? "calendar" : p==="forecast" ? "forecast" : "compare"; }
// Atnaujina tabų ir poskyrių aktyvumą bei poskyrių juostos matomumą
function updateTabUI(){
  const g = periodGroup(period);
  document.querySelectorAll("#tabs button").forEach(x => x.classList.toggle("active", x.dataset.g===g));
  document.getElementById("subtabs").hidden = g !== "compare";
  document.querySelectorAll("#subtabs button").forEach(x => x.classList.toggle("active", x.dataset.p===period));
}

async function render(){
  const seq = ++renderSeq;
  const statusEl = document.getElementById("status");
  const box = document.getElementById("cities");
  const isDayMode = period==="day" || (period==="custom" && subMode==="single");
  updateTabUI();
  const hintEl = document.getElementById("hint");
  if(isDayMode){ hintEl.style.display = ""; hintEl.textContent = t("hint"); }
  else if(period==="forecast"){ hintEl.style.display = ""; hintEl.textContent = t("fcHint"); }
  else hintEl.style.display = "none";
  document.getElementById("legend").style.display = period==="year" ? "none" : "";
  document.getElementById("pick").classList.toggle("show", period==="custom");
  document.getElementById("dayPickRow").hidden = period !== "day";
  document.getElementById("fcPick").hidden = period !== "forecast";
  document.getElementById("cityBox").hidden = period === "year";

  if(period === "year"){
    statusEl.style.display = "none";
    document.getElementById("dateLabel").textContent = "";
    box.innerHTML = calendarHTML(calYear);
    return;
  }

  statusEl.style.display = "block";
  statusEl.textContent = t("loading");
  box.innerHTML = "";

  try{
    let html;
    if(period === "forecast"){
      // Ateinančios fcDays dienos nuo šiandien vs pernai ta pati sav. diena
      const start = today0();
      const fcList = [];
      for(let i=0; i<fcDays; i++) fcList.push(shift(start, i));
      const last = fcList[fcList.length-1];
      // Pernai lygiuotės — ištisinis archyvo rėžis (sav. dienos eina iš eilės)
      const a1 = isoAlign(start), a2 = isoAlign(last);
      const pStart = a1 <= a2 ? a1 : a2, pEnd = a1 <= a2 ? a2 : a1;
      // Švenčių žemėlapis prognozės laikotarpio metams
      const holMap = {};
      [...new Set([start.getFullYear(), last.getFullYear()])].forEach(yy =>
        holidayList(yy).forEach(h => { (holMap[h.k] = holMap[h.k]||[]).push(h); }));
      document.getElementById("dateLabel").textContent = t("fcLabel", fcDays);
      setLegend(t("thisYear"), t("lastYear"));
      html = await renderCities(async (c) => {
        const [jNow, pastData] = await Promise.all([fetchRecent(c), rangeDaily(c, pStart, pEnd)]);
        return forecastCard(c, fcList, jNow, pastData, holMap, start);
      });
    }else if(isDayMode){
      let dA, dB, lA, lB, rA, rB;
      if(period === "custom"){
        dA = parseDate(document.getElementById("dateA").value);
        dB = parseDate(document.getElementById("dateB").value);
        lA = rA = fShortY(dA);            // 26-06-12 — su metais, bet telpa stulpelyje
        lB = rB = fShortY(dB);
        document.getElementById("dateLabel").textContent = "";
        setLegend(`${fmtDate(dA)} (${fDow(dA)})`, `${fmtDate(dB)} (${fDow(dB)})`);
      }else{
        // Pasirinkta diena (numatyta — šiandien) vs ta pati ISO savaitės
        // diena pernai (penktadienis su penktadieniu)
        const v = document.getElementById("dayPick").value;
        dA = v ? parseDate(v) : today0();
        dB = isoAlign(dA);
        const isToday = fmtDate(dA) === fmtDate(new Date());
        if(isToday){
          lA = t("thisYear"); lB = t("lastYear"); rA = t("thisYearLc"); rB = t("lastYearLc");
          setLegend(`${t("thisYear")} · ${fDow(dA)} ${fShort(dA)}`, `${t("lastYear")} · ${fDow(dB)} ${fShort(dB)}`);
        }else{
          lA = rA = fShortY(dA); lB = rB = fShortY(dB);
          setLegend(`${fShortY(dA)} (${fDow(dA)})`, `${fShortY(dB)} (${fDow(dB)})`);
        }
        document.getElementById("dateLabel").textContent =
          cap(dA.toLocaleDateString(loc(), {weekday:"long"}));
      }
      chartDays = {dA, dB};
      html = await renderCities(async (c, i) => {
        const [ha, hb] = await Promise.all([getDayHours(c, dA), getDayHours(c, dB)]);
        return cityCard(c, i, statsFromHours(ha), statsFromHours(hb),
          {tagNow:lA, tagPast:lB, rainNow:rA, rainPast:rB, nDays:1, tappable:true,
           cNow:comfortIndex(ha.day), cPast:comfortIndex(hb.day)});
      });
    }else{
      // Daugiadieniai laikotarpiai: A (šis) ir B (lyginamasis)
      let s, e2, bs, lA, lB, rA = "", rB = "";
      if(period === "custom"){
        s = parseDate(document.getElementById("rFrom").value);
        e2 = parseDate(document.getElementById("rTo").value);
        if(e2 < s){ const t = s; s = e2; e2 = t; }
        bs = rangeBStart(s);
      }else if(period === "week"){
        // Einanti ISO savaitė nuo pirmadienio iki šiandien
        // vs ta pati ISO savaitė pernai (tos pačios savaitės dienos)
        e2 = today0();
        s = shift(e2, -((e2.getDay()+6)%7));
        bs = isoAlign(s);
      }else{
        // Einantis mėnuo nuo 1 d. iki šiandien vs tas pats mėnuo pernai 1 d. – ta pati diena
        e2 = today0();
        s = new Date(e2.getFullYear(), e2.getMonth(), 1);
        bs = new Date(e2.getFullYear()-1, e2.getMonth(), 1);
      }
      const len = Math.round((e2 - s)/86400000);
      const be = shift(bs, len);
      if(period === "custom"){
        lA = fShortY(s); lB = fShortY(bs);
        document.getElementById("dateLabel").textContent = t("periodDays", len+1);
        document.getElementById("cmpInfo").innerHTML =
          t("comparedTo", `${fmtDate(bs)} – ${fmtDate(be)}`);
        setLegend(`${fmtDate(s)} – ${fmtDate(e2)}`, `${fmtDate(bs)} – ${fmtDate(be)}`);
      }else{
        lA = t("thisYear"); lB = t("lastYear"); rA = t("thisYearLc"); rB = t("lastYearLc");
        document.getElementById("dateLabel").textContent = period === "week"
          ? t("weekLabel", isoWeek(e2))
          : t("monthRange", cap(e2.toLocaleDateString(loc(), {month:"long"})), e2.getDate());
        setLegend(`${t("thisYear")} · ${fShort(s)} – ${fShort(e2)}`, `${t("lastYear")} · ${fShort(bs)} – ${fShort(be)}`);
      }
      html = await renderCities(async (c, i) => {
        const [da, db] = await Promise.all([rangeDaily(c, s, e2), rangeDaily(c, bs, be)]);
        const daysA = sliceDays(da, s, e2), daysB = sliceDays(db, bs, be);
        const o = {tagNow:lA, tagPast:lB, rainNow:rA, rainPast:rB, nDays:len+1, tappable:false,
          cNow:comfortForDays(daysA), cPast:comfortForDays(daysB)};
        if(period === "month" || period === "week") o.badHTML = badDaysHTML(daysA, daysB);
        return cityCard(c, i, stats(daysA), stats(daysB), o);
      });
    }
    if(seq !== renderSeq) return;
    box.innerHTML = html.join("");
    statusEl.style.display = "none";
    markUpdated();
  }catch(e){
    if(seq !== renderSeq) return;
    statusEl.textContent = String(e && e.message || e).includes("429")
      ? t("err429")
      : t("errGeneric", e.message);
  }
}

function rangeBStart(s){
  if(rangeCmp === "cal") return lastYear(s);
  if(rangeCmp === "dow") return isoAlign(s);
  return shift(s, -7);
}

document.getElementById("seg").addEventListener("click", e => {
  const b = e.target.closest("button");
  if(!b) return;
  subMode = b.dataset.s;
  document.querySelectorAll("#seg button").forEach(x => x.classList.toggle("active", x===b));
  document.getElementById("singleBox").hidden = subMode !== "single";
  document.getElementById("rangeBox").hidden = subMode !== "range";
  render();
});
// Greitas dienos B parinkimas: kalendorinė data pernai arba ta pati sav. diena
document.getElementById("chipsSingle").addEventListener("click", e => {
  const b = e.target.closest("button");
  if(!b || !dateA.value) return;
  const dA = parseDate(dateA.value);
  dateB.value = fmtDate(b.dataset.c === "dow" ? isoAlign(dA) : lastYear(dA));
  render();
});
document.getElementById("chipsRange").addEventListener("click", e => {
  const b = e.target.closest("button");
  if(!b) return;
  rangeCmp = b.dataset.r;
  document.querySelectorAll("#chipsRange button").forEach(x => x.classList.toggle("active", x===b));
  render();
});

// Kalendoriaus navigacija + valandų grafiko išskleidimas
document.getElementById("cities").addEventListener("click", async e => {
  if(period === "year"){
    if(e.target.id === "cprev"){ calYear--; render(); }
    else if(e.target.id === "cnext"){ calYear++; render(); }
    return;
  }
  if(period !== "day" && period !== "custom") return;
  const card = e.target.closest(".city");
  if(!card || card.dataset.i === undefined) return;
  const boxEl = card.querySelector(".chartBox");
  if(!boxEl) return;
  if(!boxEl.hidden){ boxEl.hidden = true; return; }
  boxEl.hidden = false;
  if(boxEl.dataset.loaded) return;
  boxEl.innerHTML = `<div class="nochart">${t("chartLoading")}</div>`;
  const c = CITIES[+card.dataset.i];
  if(!chartDays) return;
  const {dA, dB} = chartDays;
  try{
    const [ra, rb] = await Promise.all([getDayHours(c, dA), getDayHours(c, dB)]);
    boxEl.innerHTML = chartSVG(ra, rb);
    boxEl.dataset.loaded = "1";
  }catch(err){
    boxEl.innerHTML = `<div class="nochart">${t("loadFail", err.message)}</div>`;
  }
});

// Viršutiniai tabai (grupės): „Palyginti" grąžina paskutinį poskyrį
document.getElementById("tabs").addEventListener("click", e => {
  const b = e.target.closest("button");
  if(!b) return;
  const g = b.dataset.g;
  period = g === "forecast" ? "forecast" : g === "calendar" ? "year" : lastComparePeriod;
  render();
});
// Poskyriai (Diena/Savaitė/Mėnuo/Data)
document.getElementById("subtabs").addEventListener("click", e => {
  const b = e.target.closest("button");
  if(!b) return;
  period = lastComparePeriod = b.dataset.p;
  render();
});
// Prognozės trukmė (3/7/14 d.)
document.getElementById("fcSeg").addEventListener("click", e => {
  const b = e.target.closest("button");
  if(!b) return;
  fcDays = +b.dataset.n;
  document.querySelectorAll("#fcSeg button").forEach(x => x.classList.toggle("active", x===b));
  render();
});

// Miestų pasirinkimas: chips apačioje, išsaugoma localStorage
function renderCityPick(){
  document.getElementById("cityPick").innerHTML = ALL_CITIES.map(c =>
    `<button data-city="${c.name}" class="${activeCities.has(c.name)?"active":""}">${cityLabel(c)}</button>`
  ).join("");
}
document.getElementById("cityPick").addEventListener("click", e => {
  const b = e.target.closest("button");
  if(!b) return;
  const name = b.dataset.city;
  if(activeCities.has(name)){
    if(activeCities.size === 1) return;   // bent vienas miestas turi likti
    activeCities.delete(name);
  }else{
    activeCities.add(name);
  }
  try{ localStorage.setItem("orai.cities", JSON.stringify([...activeCities])); }catch(e2){}
  CITIES = ALL_CITIES.filter(c => activeCities.has(c.name));
  renderCityPick();
  render();
});
renderCityPick();

// Statinių (HTML) tekstų vertimas pagal pasirinktą kalbą
function applyI18n(){
  document.documentElement.lang = lang;
  document.title = t("title");
  document.querySelector("h1").textContent = t("h1");
  document.getElementById("refresh").setAttribute("aria-label", t("refresh"));
  document.querySelectorAll("#tabs button").forEach(b => b.textContent = t("group_"+b.dataset.g));
  document.querySelectorAll("#subtabs button").forEach(b => b.textContent = t("tab_"+b.dataset.p));
  document.querySelectorAll("#fcSeg button").forEach(b => b.textContent = t("fcDur", +b.dataset.n));
  document.getElementById("dayPickLabel").textContent = t("dayPickLabel");
  document.querySelectorAll("#seg button").forEach(b => b.textContent = t("seg_"+b.dataset.s));
  document.getElementById("lblDateA").textContent = t("lbl_dateA");
  document.getElementById("lblDateB").textContent = t("lbl_dateB");
  document.getElementById("quickCmpLabel").textContent = t("quickCmp");
  document.querySelectorAll("#chipsSingle button").forEach(b => b.textContent = t("chip_"+b.dataset.c));
  document.getElementById("lblFrom").textContent = t("lbl_from");
  document.getElementById("lblTo").textContent = t("lbl_to");
  document.getElementById("cmpWhatLabel").textContent = t("cmpWhat");
  document.querySelectorAll("#chipsRange button").forEach(b => b.textContent = t("rchip_"+b.dataset.r));
  document.getElementById("hint").textContent = t("hint");
  document.getElementById("citiesLabel").textContent = t("cities");
  document.querySelectorAll("#langSel button").forEach(b => b.classList.toggle("active", b.dataset.l===lang));
}
applyI18n();

// Kalbos perjungimas — įsimenamas localStorage, perpiešiama viskas
document.getElementById("langSel").addEventListener("click", e => {
  const b = e.target.closest("button");
  if(!b || b.dataset.l === lang) return;
  lang = b.dataset.l;
  try{ localStorage.setItem("orai.lang", lang); }catch(e2){}
  applyI18n();
  renderCityPick();
  render();
});

// Rankinis atnaujinimas — išvalom kešą, kad duomenys būtų tikrai švieži
const refreshBtn = document.getElementById("refresh");
refreshBtn.addEventListener("click", async () => {
  refreshBtn.classList.add("loading");
  clearData();
  await render();
  refreshBtn.classList.remove("loading");
});

// Grįžus į pirmą planą (iOS „Add to Home Screen" užšaldo paskutinį vaizdą)
// atnaujinam, jei duomenys senesni nei 30 min
function freshen(){
  if(Date.now() - lastFetch > 30*60*1000){
    clearData();
    render();
  }
}
document.addEventListener("visibilitychange", () => {
  if(document.visibilityState === "visible") freshen();
});
window.addEventListener("pageshow", e => {
  if(e.persisted) freshen();   // Safari bfcache
});

render();
</script>
